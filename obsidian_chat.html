<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Gemma 9B UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --sidebar-bg: #171717;
            --main-bg: #212121;
            --input-bg: #2f2f2f;
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --border: #ececec1a; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--main-bg);
            color: var(--text-main);
            overflow: hidden;
        }

        /* ==== SIDEBAR ==== */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 10px;
            font-size: 14px;
            flex-shrink: 0;
        }
        .sidebar-top, .sidebar-bottom {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .sidebar-middle {
            flex: 1;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-item:hover {
            background-color: var(--input-bg);
        }
        .nav-item.new-chat {
            justify-content: space-between;
        }
        .nav-icon {
            width: 16px;
            display: flex;
            justify-content: center;
        }
        
        /* ==== MAIN CONTENT ==== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .top-bar {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* ==== CHAT AREA ==== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }
        .empty-state h1 {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 40px;
        }

        .message-row {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 24px 20px;
        }
        .message-container {
            width: 100%;
            max-width: 768px;
            display: flex;
            gap: 16px;
        }
        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 2px;
            background-color: #10a37f; /* OpenAI green */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            color: white;
            font-weight: 600;
        }
        .avatar.user {
            background-color: #5e5e5e;
            border-radius: 50%;
        }
        .message-content {
            flex: 1;
            font-size: 16px;
            line-height: 1.65;
            color: #d1d5db; 
            white-space: pre-wrap;
        }

        /* ==== INPUT AREA ==== */
        .input-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 24px 20px;
            flex-shrink: 0;
        }
        .input-box-wrapper {
            position: relative;
            width: 100%;
            max-width: 768px;
            background-color: var(--input-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            transition: border-color 0.1s;
        }
        .input-box-wrapper:focus-within {
            border-color: #ffffff33;
        }
        
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            resize: none;
            outline: none;
            max-height: 200px;
            font-family: 'Inter', sans-serif;
            line-height: 24px;
            padding: 4px 0;
        }
        
        .send-btn {
            background-color: #fff;
            color: #000;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            margin-bottom: 2px;
        }
        .send-btn:disabled {
            background-color: #4a4a4a;
            color: #6a6a6a;
            cursor: not-allowed;
        }
        
        .disclaimer {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 12px;
            text-align: center;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px;}
        ::-webkit-scrollbar-thumb:hover { background: #565656; }
        
        /* THINKING ANIMATION */
        .thinking-cursor {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #d1d5db;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.2; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-top">
        <div class="nav-item new-chat" onclick="location.reload()">
            <span style="display: flex; align-items: center; gap: 10px;">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></span>
                New chat
            </span>
            <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path></svg></span>
        </div>
        <div class="nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
            Search chats
        </div>
        <div class="nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg></span>
            More
        </div>
    </div>
    
    <div class="sidebar-middle"></div>

    <div class="sidebar-bottom">
        <div class="nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg></span>
            See plans and pricing
        </div>
        <div class="nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></span>
            Settings
        </div>
        <div class="nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></span>
            Help
        </div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        Gemma 9B <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:8px"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
            <h1>What are you working on?</h1>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box-wrapper">
            <textarea 
                id="userInput" 
                placeholder="Message Gemma 9B..." 
                rows="1"
                onkeydown="handleEnter(event)"
                oninput="this.style.height = '24px'; this.style.height = this.scrollHeight + 'px'"
            ></textarea>
            <button id="sendBtn" class="send-btn" onclick="sendMessage()" disabled>
                <!-- Send Arrow SVG -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        <div class="disclaimer">
            Gemma 9B can make mistakes. Check important info.
        </div>
    </div>
</div>

<script>
    // YOUR ENDPOINT 
    const url = "https://loud-experts-cut.loca.lt/chat";
    
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const emptyState = document.getElementById('emptyState');

    // Toggle send button based on text
    userInput.addEventListener('input', () => {
        sendBtn.disabled = userInput.value.trim().length === 0;
    });

    function handleEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        if (emptyState) emptyState.style.display = 'none';

        // 1. Show User message
        appendMessage('U', text, 'user');
        
        // Reset input box
        userInput.value = '';
        userInput.style.height = '24px'; 
        sendBtn.disabled = true;

        // 2. Show AI message with 'Thinking Cursor'
        const aiMessageContainer = document.createElement('div');
        aiMessageContainer.className = 'message-row';
        aiMessageContainer.innerHTML = `
            <div class="message-container">
                <div class="avatar ai">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <div class="message-content"><div class="thinking-cursor"></div></div>
            </div>
        `;
        chatArea.appendChild(aiMessageContainer);
        scrollToBottom();

        const contentDiv = aiMessageContainer.querySelector('.message-content');

        try {
            // 3. Ping Your Colab Server
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Bypass-Tunnel-Reminder': 'true'
                },
                body: JSON.stringify({ prompt: text })
            });

            if (!response.ok) throw new Error(`Status ${response.status}`);

            const data = await response.json();
            const reply = data.reply || "";

            // Remove thinking cursor
            contentDiv.innerHTML = '';
            
            // 4. Simulate streaming response keyword-by-keyword
            await simulateTyping(reply, contentDiv);

        } catch (error) {
            contentDiv.innerHTML = `<i>Error: Could not reach endpoint (${error.message})</i>`;
        } finally {
            scrollToBottom();
            userInput.focus();
        }
    }

    function appendMessage(avatarLetter, content, role) {
        const row = document.createElement('div');
        row.className = 'message-row';
        
        let avatarHTML = '';
        if (role === 'user') {
            avatarHTML = `<div class="avatar user">${avatarLetter}</div>`;
        } else {
            avatarHTML = `<div class="avatar ai">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            </div>`;
        }

        row.innerHTML = `
            <div class="message-container">
                ${avatarHTML}
                <div class="message-content"></div>
            </div>
        `;
        row.querySelector('.message-content').textContent = content; // prevents HTML injection
        chatArea.appendChild(row);
        scrollToBottom();
    }

    async function simulateTyping(fullText, element) {
        element.textContent = '';
        
        // Split by spaces so it simulates typing keywords chunks rather than single letters
        const tokens = fullText.split(/(\s+)/);
        
        for (let i = 0; i < tokens.length; i++) {
            element.textContent += tokens[i];
            
            // Fast, randomized delay to perfectly mimic real Gemma 9B streaming
            const delay = Math.random() * 30 + 10; 
            await new Promise(r => setTimeout(r, delay));
            
            // Keep window scrolling down naturally as text populates
            scrollToBottom();
        }
    }

    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }
</script>

</body>
</html>
